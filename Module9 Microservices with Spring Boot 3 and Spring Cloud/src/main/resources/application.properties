# MySQL Shared Database Configurations
spring.datasource.url=jdbc:mysql://localhost:3306/central_bank_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Navya@1705
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- Eureka Discovery Server Configuration Settings ---
# Set the port to the standard Eureka port
server.port=8761

# Disable self-preservation to ensure immediate cleanup during tests
eureka.server.enable-self-preservation=false

# Standalone configuration rules (Server doesn't need to look up or register with itself)
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# The cluster base address pointing to itself
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/